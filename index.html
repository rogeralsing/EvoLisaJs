<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Genetic Vectorizer by Roger Alsing</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
  font-size: 13px;
  background: #f0f0f0;
  color: #000;
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}
#menubar {
  background: #f0f0f0;
  border-bottom: 1px solid #999;
  padding: 2px 0;
  display: flex;
  position: relative;
  z-index: 100;
}
.menu-item {
  padding: 3px 10px;
  cursor: pointer;
  position: relative;
  user-select: none;
}
.menu-item:hover, .menu-item.open { background: #c8dcf0; }
.menu-dropdown {
  display: none;
  position: absolute;
  top: 100%;
  left: 0;
  background: #fff;
  border: 1px solid #999;
  box-shadow: 2px 2px 6px rgba(0,0,0,0.2);
  min-width: 180px;
  z-index: 200;
}
.menu-item.open > .menu-dropdown { display: block; }
.menu-option {
  padding: 5px 20px;
  cursor: pointer;
  white-space: nowrap;
}
.menu-option:hover { background: #c8dcf0; }
.menu-sep { border-top: 1px solid #ccc; margin: 2px 0; }
.menu-header { padding: 3px 20px; font-size: 11px; color: #666; }
#main { display: flex; flex: 1; overflow: hidden; }
#left-panel {
  width: 240px; min-width: 240px;
  background: #f0f0f0;
  border-right: 2px solid #aaa;
  display: flex; flex-direction: column;
  padding: 4px;
}
#left-panel label { font-size: 12px; margin-bottom: 2px; }
#source-container { margin-bottom: 8px; }
#source-container img, #source-container canvas {
  max-width: 220px; display: block; border: 1px solid #888;
}
#source-placeholder {
  width: 200px; height: 200px; background: #ddd; border: 1px solid #888;
  display: flex; align-items: center; justify-content: center;
  color: #888; font-size: 11px;
}
.spacer { flex: 1; }
#scale-section { margin-bottom: 4px; }
#scale-section label { display: block; }
#scale-row { display: flex; align-items: center; gap: 4px; }
#scale-row input[type=range] { flex: 1; }
#btnStart {
  padding: 10px; font-size: 14px; cursor: pointer;
  border: 1px solid #888; background: #e1e1e1;
}
#btnStart:hover { background: #d0d0d0; }
#btnStart:active { background: #c0c0c0; }
#right-panel { flex: 1; background: #f0f0f0; padding: 4px; overflow: auto; }
#right-panel label { font-size: 12px; margin-bottom: 2px; display: block; }
#generated-svg { border: 1px solid #888; background: #000; display: block; }
#statusbar {
  background: #f0f0f0; border-top: 1px solid #999;
  display: flex; padding: 2px 4px; font-size: 12px; min-height: 22px;
}
.status-label { padding: 0 4px; font-weight: bold; }
.status-value { padding: 0 4px; min-width: 80px; border-right: 1px solid #aaa; }
#file-input, #dna-input { display: none; }
</style>
</head>
<body>
<div id="menubar">
  <div class="menu-item" id="menu-file">File
    <div class="menu-dropdown">
      <div class="menu-header">Open</div>
      <div class="menu-option" id="menu-open-image">Source Image...</div>
      <div class="menu-option" id="menu-open-dna">DNA...</div>
      <div class="menu-sep"></div>
      <div class="menu-header">Save</div>
      <div class="menu-option" id="menu-save-dna">DNA</div>
      <div class="menu-option" id="menu-save-svg">SVG</div>
    </div>
  </div>
</div>
<div id="main">
  <div id="left-panel">
    <label>Source image</label>
    <div id="source-container">
      <div id="source-placeholder">Drop image or use File &gt; Open</div>
      <canvas id="source-canvas" style="display:none;"></canvas>
    </div>
    <div class="spacer"></div>
    <div id="scale-section">
      <label>Generated image scale:</label>
      <div id="scale-row">
        <span>1</span>
        <input type="range" id="trackBarScale" min="1" max="10" value="3">
        <span>10</span>
      </div>
    </div>
    <button id="btnStart" disabled>Start</button>
  </div>
  <div id="right-panel">
    <label>Generated image</label>
    <div id="svg-container"></div>
  </div>
</div>
<div id="statusbar">
  <span class="status-label">Fitness</span>
  <span class="status-value" id="stat-fitness">-</span>
  <span class="status-label">Generation</span>
  <span class="status-value" id="stat-generation">-</span>
  <span class="status-label">Selected</span>
  <span class="status-value" id="stat-selected">-</span>
  <span class="status-label">Points</span>
  <span class="status-value" id="stat-points">-</span>
  <span class="status-label">Polygons</span>
  <span class="status-value" id="stat-polygons">-</span>
  <span class="status-label">Points / polygon</span>
  <span class="status-value" id="stat-avgpoints" style="border-right:none;">-</span>
</div>
<input type="file" id="file-input" accept="image/*">
<input type="file" id="dna-input" accept=".json">

const FITNESS_SIZE = 50;

const Settings = {
  addPolygonMutationRate: 700, removePolygonMutationRate: 1500, movePolygonMutationRate: 700,
  addPointMutationRate: 1500, removePointMutationRate: 1500,
  movePointMaxMutationRate: 1500, movePointMidMutationRate: 1500, movePointMinMutationRate: 1500,
  redMutationRate: 1500, greenMutationRate: 1500, blueMutationRate: 1500, alphaMutationRate: 1500,
  redRangeMin: 0, redRangeMax: 255, greenRangeMin: 0, greenRangeMax: 255,
  blueRangeMin: 0, blueRangeMax: 255, alphaRangeMin: 30, alphaRangeMax: 60,
  polygonsMin: 0, polygonsMax: 50,
  pointsPerPolygonMin: 3, pointsPerPolygonMax: 10,
  pointsMin: 0, pointsMax: 1500,
  movePointRangeMin: 3, movePointRangeMid: 20,
};

function getRandomNumber(min, max) { return min + Math.floor(Math.random() * (max - min)); }
function willMutate(rate) { return getRandomNumber(0, rate) === 1; }
function clamp(v, lo, hi) { return v < lo ? lo : v > hi ? hi : v; }

class DnaPoint {
  constructor(x, y) { this.x = x; this.y = y; }
  static getRandom(mx, my) { return new DnaPoint(getRandomNumber(0, mx), getRandomNumber(0, my)); }
  clone() { return new DnaPoint(this.x, this.y); }
  mutate(d) {
    if (willMutate(Settings.movePointMaxMutationRate)) {
      this.x = getRandomNumber(0, d.width); this.y = getRandomNumber(0, d.height); d.isDirty = true;
    }
    if (willMutate(Settings.movePointMidMutationRate)) {
      this.x = clamp(this.x + getRandomNumber(-Settings.movePointRangeMid, Settings.movePointRangeMid), 0, d.width);
      this.y = clamp(this.y + getRandomNumber(-Settings.movePointRangeMid, Settings.movePointRangeMid), 0, d.height);
      d.isDirty = true;
    }
    if (willMutate(Settings.movePointMinMutationRate)) {
      this.x = clamp(this.x + getRandomNumber(-Settings.movePointRangeMin, Settings.movePointRangeMin), 0, d.width);
      this.y = clamp(this.y + getRandomNumber(-Settings.movePointRangeMin, Settings.movePointRangeMin), 0, d.height);
      d.isDirty = true;
    }
  }
}

class DnaBrush {
  constructor(r, g, b, a) { this.red = r; this.green = g; this.blue = b; this.alpha = a; }
  static getRandom() { return new DnaBrush(getRandomNumber(0,255), getRandomNumber(0,255), getRandomNumber(0,255), getRandomNumber(10,60)); }
  clone() { return new DnaBrush(this.red, this.green, this.blue, this.alpha); }
  mutate(d) {
    if (willMutate(Settings.redMutationRate)) { this.red = getRandomNumber(Settings.redRangeMin, Settings.redRangeMax); d.isDirty = true; }
    if (willMutate(Settings.greenMutationRate)) { this.green = getRandomNumber(Settings.greenRangeMin, Settings.greenRangeMax); d.isDirty = true; }
    if (willMutate(Settings.blueMutationRate)) { this.blue = getRandomNumber(Settings.blueRangeMin, Settings.blueRangeMax); d.isDirty = true; }
    if (willMutate(Settings.alphaMutationRate)) { this.alpha = getRandomNumber(Settings.alphaRangeMin, Settings.alphaRangeMax); d.isDirty = true; }
  }
}

class DnaPolygon {
  constructor(points, brush) { this.points = points; this.brush = brush; }
  static getRandom(mx, my) {
    const pts = [], o = DnaPoint.getRandom(mx, my);
    for (let i = 0; i < Settings.pointsPerPolygonMin; i++)
      pts.push(new DnaPoint(clamp(o.x+getRandomNumber(-3,3),0,mx), clamp(o.y+getRandomNumber(-3,3),0,my)));
    return new DnaPolygon(pts, DnaBrush.getRandom());
  }
  clone() { return new DnaPolygon(this.points.map(p=>p.clone()), this.brush.clone()); }
  mutate(drawing) {
    if (willMutate(Settings.addPointMutationRate)) {
      if (this.points.length < Settings.pointsPerPolygonMax && drawing.pointCount < Settings.pointsMax) {
        const i = getRandomNumber(1, this.points.length - 1);
        const prev = this.points[i-1], next = this.points[i];
        this.points.splice(i, 0, new DnaPoint(Math.floor((prev.x+next.x)/2), Math.floor((prev.y+next.y)/2)));
        drawing.isDirty = true;
      }
    }
    if (willMutate(Settings.removePointMutationRate)) {
      if (this.points.length > Settings.pointsPerPolygonMin && drawing.pointCount > Settings.pointsMin) {
        this.points.splice(getRandomNumber(0, this.points.length), 1);
        drawing.isDirty = true;
      }
    }
    this.brush.mutate(drawing);
    for (const p of this.points) p.mutate(drawing);
  }
}

class DnaDrawing {
  constructor(w, h, polys) { this.width = w; this.height = h; this.polygons = polys || []; this.isDirty = false; }
  get pointCount() { let c = 0; for (const p of this.polygons) c += p.points.length; return c; }
  static getRandom(w, h) {
    const d = new DnaDrawing(w, h);
    for (let i = 0; i < Settings.polygonsMin; i++) d.addPolygon();
    return d;
  }
  clone() { const d = new DnaDrawing(this.width, this.height, this.polygons.map(p=>p.clone())); d.isDirty = false; return d; }
  addPolygon() {
    if (this.polygons.length < Settings.polygonsMax) {
      const np = DnaPolygon.getRandom(this.width, this.height);
      const i = this.polygons.length > 0 ? getRandomNumber(0, this.polygons.length) : 0;
      this.polygons.splice(i, 0, np); return true;
    } return false;
  }
  removePolygon() {
    if (this.polygons.length > Settings.polygonsMin) {
      this.polygons.splice(getRandomNumber(0, this.polygons.length), 1); return true;
    } return false;
  }
  movePolygon() {
    if (this.polygons.length < 1) return false;
    let i = getRandomNumber(0, this.polygons.length);
    const p = this.polygons[i]; this.polygons.splice(i, 1);
    i = this.polygons.length > 0 ? getRandomNumber(0, this.polygons.length) : 0;
    this.polygons.splice(i, 0, p); return true;
  }
  mutate() {
    if (willMutate(Settings.addPolygonMutationRate)) { if (this.addPolygon()) this.isDirty = true; }
    if (willMutate(Settings.removePolygonMutationRate)) { if (this.removePolygon()) this.isDirty = true; }
    if (willMutate(Settings.movePolygonMutationRate)) { if (this.movePolygon()) this.isDirty = true; }
    for (const p of this.polygons) p.mutate(this);
  }
  toJSON() {
    return { width: this.width, height: this.height,
      polygons: this.polygons.map(p => ({
        brush: { r: p.brush.red, g: p.brush.green, b: p.brush.blue, a: p.brush.alpha },
        points: p.points.map(pt => ({ x: pt.x, y: pt.y }))
      }))
    };
  }
  static fromJSON(j) {
    const d = new DnaDrawing(j.width, j.height);
    d.polygons = j.polygons.map(p => new DnaPolygon(
      p.points.map(pt => new DnaPoint(pt.x, pt.y)),
      new DnaBrush(p.brush.r, p.brush.g, p.brush.b, p.brush.a)
    ));
    return d;
  }
}

// --- Canvas renderer (fitness only) ---
function renderToCanvas(drawing, ctx, scaleX, scaleY) {
  ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);
  ctx.fillStyle = "#000";
  ctx.fillRect(0, 0, ctx.canvas.width, ctx.canvas.height);
  for (const polygon of drawing.polygons) {
    const b = polygon.brush;
    ctx.fillStyle = "rgba("+b.red+","+b.green+","+b.blue+","+(b.alpha/255)+")";
    ctx.beginPath();
    const pts = polygon.points;
    if (pts.length === 0) continue;
    ctx.moveTo(pts[0].x * scaleX, pts[0].y * scaleY);
    for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x * scaleX, pts[i].y * scaleY);
    ctx.closePath(); ctx.fill();
  }
}

// --- SVG renderer (display) ---
function renderToSVG(drawing, svgEl, displayWidth, displayHeight) {
  svgEl.setAttribute("viewBox", "0 0 " + drawing.width + " " + drawing.height);
  svgEl.setAttribute("width", displayWidth);
  svgEl.setAttribute("height", displayHeight);
  let html = '<rect width="' + drawing.width + '" height="' + drawing.height + '" fill="#000"/>';
  for (const polygon of drawing.polygons) {
    const b = polygon.brush;
    const pts = polygon.points;
    if (pts.length === 0) continue;
    const pointsStr = pts.map(p => p.x + "," + p.y).join(" ");
    const alpha = (b.alpha / 255).toFixed(3);
    html += '<polygon points="' + pointsStr + '" fill="rgba(' + b.red + ',' + b.green + ',' + b.blue + ',' + alpha + ')"/>';
  }
  svgEl.innerHTML = html;
}

function drawingToSVGString(drawing) {
  let svg = '<?xml version="1.0" encoding="UTF-8"?>\n';
  svg += '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ' + drawing.width + ' ' + drawing.height + '" width="' + drawing.width + '" height="' + drawing.height + '">\n';
  svg += '  <rect width="' + drawing.width + '" height="' + drawing.height + '" fill="#000"/>\n';
  for (const polygon of drawing.polygons) {
    const b = polygon.brush;
    const pts = polygon.points;
    if (pts.length === 0) continue;
    const pointsStr = pts.map(p => p.x + "," + p.y).join(" ");
    const alpha = (b.alpha / 255).toFixed(3);
    svg += '  <polygon points="' + pointsStr + '" fill="rgba(' + b.red + ',' + b.green + ',' + b.blue + ',' + alpha + ')"/>\n';
  }
  svg += '</svg>\n';
  return svg;
}

// --- Fitness Calculator (downscaled) ---
class FitnessCalculator {
  constructor(sourceImage, drawingWidth, drawingHeight) {
    const aspect = drawingWidth / drawingHeight;
    if (aspect >= 1) {
      this.fitW = FITNESS_SIZE;
      this.fitH = Math.round(FITNESS_SIZE / aspect);
    } else {
      this.fitH = FITNESS_SIZE;
      this.fitW = Math.round(FITNESS_SIZE * aspect);
    }
    const srcCanvas = document.createElement("canvas");
    srcCanvas.width = this.fitW; srcCanvas.height = this.fitH;
    const srcCtx = srcCanvas.getContext("2d", { willReadFrequently: true });
    srcCtx.drawImage(sourceImage, 0, 0, this.fitW, this.fitH);
    this.sourcePixels = srcCtx.getImageData(0, 0, this.fitW, this.fitH).data;
    this.drawingWidth = drawingWidth; this.drawingHeight = drawingHeight;
    this.scaleX = this.fitW / drawingWidth; this.scaleY = this.fitH / drawingHeight;
    this.offCanvas = document.createElement("canvas");
    this.offCanvas.width = this.fitW; this.offCanvas.height = this.fitH;
    this.offCtx = this.offCanvas.getContext("2d", { willReadFrequently: true });
  }
  getFitness(drawing) {
    renderToCanvas(drawing, this.offCtx, this.scaleX, this.scaleY);
    const p1 = this.offCtx.getImageData(0, 0, this.fitW, this.fitH).data;
    const p2 = this.sourcePixels;
    let error = 0;
    for (let i = 0, len = p1.length; i < len; i += 4) {
      const dr = p1[i]-p2[i], dg = p1[i+1]-p2[i+1], db = p1[i+2]-p2[i+2];
      error += dr*dr + dg*dg + db*db;
    }
    return error;
  }
}

class EvolutionEngine {
  constructor(sourceImage) {
    this.sourceImage = sourceImage;
    this.width = sourceImage.naturalWidth || sourceImage.width;
    this.height = sourceImage.naturalHeight || sourceImage.height;
    this.fitnessCalc = new FitnessCalculator(sourceImage, this.width, this.height);
    this.currentDrawing = null;
    this.errorLevel = Infinity;
    this.generation = 0; this.selected = 0; this.candidates = 0;
    this.running = false;
  }
  start() {
    if (!this.currentDrawing) this.currentDrawing = DnaDrawing.getRandom(this.width, this.height);
    this.running = true; this._runBatch();
  }
  stop() { this.running = false; }
  _runBatch() {
    if (!this.running) return;
    for (let i = 0; i < 100; i++) {
      const nd = this.currentDrawing.clone(); nd.mutate(); this.candidates++;
      if (nd.isDirty) {
        this.generation++;
        const ne = this.fitnessCalc.getFitness(nd);
        if (ne <= this.errorLevel) { this.selected++; this.currentDrawing = nd; this.errorLevel = ne; }
      }
    }
    requestAnimationFrame(() => this._runBatch());
  }
  getStatistics() {
    if (!this.currentDrawing) return { errorLevel:0, generation:0, selected:0, numPoints:0, numPolygons:0, avgPointsPerPolygon:0 };
    const np = this.currentDrawing.polygons.length, npt = this.currentDrawing.pointCount;
    return { errorLevel: this.errorLevel, generation: this.generation, selected: this.selected,
      numPoints: npt, numPolygons: np, avgPointsPerPolygon: np > 0 ? npt/np : 0 };
  }
}

// === UI ===
let engine = null, sourceImage = null;
const NS = "http://www.w3.org/2000/svg";
const fileInput = document.getElementById("file-input");
const dnaInput = document.getElementById("dna-input");
const btnStart = document.getElementById("btnStart");
const svgContainer = document.getElementById("svg-container");
const srcCanvas = document.getElementById("source-canvas");
const srcCtx = srcCanvas.getContext("2d", { willReadFrequently: true });
const srcPlaceholder = document.getElementById("source-placeholder");
const scaleSlider = document.getElementById("trackBarScale");
const statFitness = document.getElementById("stat-fitness");
const statGeneration = document.getElementById("stat-generation");
const statSelected = document.getElementById("stat-selected");
const statPoints = document.getElementById("stat-points");
const statPolygons = document.getElementById("stat-polygons");
const statAvgPoints = document.getElementById("stat-avgpoints");

// Create display SVG
let svgEl = document.createElementNS(NS, "svg");
svgEl.id = "generated-svg";
svgEl.style.border = "1px solid #888";
svgEl.style.background = "#000";
svgEl.style.display = "block";
svgContainer.appendChild(svgEl);

// --- Click-based menu ---
const menuFile = document.getElementById("menu-file");
menuFile.addEventListener("click", (e) => {
  if (e.target === menuFile) {
    menuFile.classList.toggle("open");
    e.stopPropagation();
  }
});
document.addEventListener("click", (e) => {
  if (!menuFile.contains(e.target)) menuFile.classList.remove("open");
});
function closeMenu() { menuFile.classList.remove("open"); }

document.getElementById("menu-open-image").addEventListener("click", (e) => { e.stopPropagation(); closeMenu(); fileInput.click(); });
document.getElementById("menu-open-dna").addEventListener("click", (e) => { e.stopPropagation(); closeMenu(); dnaInput.click(); });
document.getElementById("menu-save-dna").addEventListener("click", (e) => { e.stopPropagation(); closeMenu(); saveDNA(); });
document.getElementById("menu-save-svg").addEventListener("click", (e) => { e.stopPropagation(); closeMenu(); saveSVG(); });

fileInput.addEventListener("change", (e) => { if (e.target.files[0]) loadImageFile(e.target.files[0]); fileInput.value = ""; });
dnaInput.addEventListener("change", (e) => { if (e.target.files[0]) loadDNAFile(e.target.files[0]); dnaInput.value = ""; });

document.body.addEventListener("dragover", (e) => e.preventDefault());
document.body.addEventListener("drop", (e) => {
  e.preventDefault();
  const f = e.dataTransfer.files[0];
  if (f) f.name.endsWith(".json") ? loadDNAFile(f) : loadImageFile(f);
});

function loadImageFromElement(img) {
  sourceImage = img;
  srcPlaceholder.style.display = "none";
  srcCanvas.style.display = "block";
  srcCanvas.width = img.naturalWidth || img.width;
  srcCanvas.height = img.naturalHeight || img.height;
  srcCanvas.style.maxWidth = "220px";
  srcCtx.drawImage(img, 0, 0);
  engine = new EvolutionEngine(img);
  updateSVGSize();
  svgEl.innerHTML = "";
  btnStart.disabled = false;
}

function loadImageFile(file) {
  if (engine && engine.running) { engine.stop(); btnStart.textContent = "Start"; }
  const img = new Image();
  img.onload = () => loadImageFromElement(img);
  img.src = URL.createObjectURL(file);
}

function loadDNAFile(file) {
  if (engine && engine.running) { engine.stop(); btnStart.textContent = "Start"; }
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const drawing = DnaDrawing.fromJSON(JSON.parse(e.target.result));
      if (engine) {
        engine.currentDrawing = drawing;
        engine.errorLevel = engine.fitnessCalc.getFitness(drawing);
        renderToGenerated();
        updateStats();
      }
    } catch (err) { alert("Failed to load DNA: " + err.message); }
  };
  reader.readAsText(file);
}

function saveDNA() {
  if (!engine || !engine.currentDrawing) { alert("No drawing to save."); return; }
  const blob = new Blob([JSON.stringify(engine.currentDrawing.toJSON(), null, 2)], { type: "application/json" });
  const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "evolisa.json"; a.click();
}

function saveSVG() {
  if (!engine || !engine.currentDrawing) { alert("No drawing to save."); return; }
  const svgStr = drawingToSVGString(engine.currentDrawing);
  const blob = new Blob([svgStr], { type: "image/svg+xml" });
  const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "evolisa.svg"; a.click();
}

function updateSVGSize() {
  if (!sourceImage) return;
  const s = parseInt(scaleSlider.value);
  const w = (sourceImage.naturalWidth || sourceImage.width) * s;
  const h = (sourceImage.naturalHeight || sourceImage.height) * s;
  svgEl.setAttribute("width", w);
  svgEl.setAttribute("height", h);
  if (engine && engine.currentDrawing) {
    svgEl.setAttribute("viewBox", "0 0 " + engine.currentDrawing.width + " " + engine.currentDrawing.height);
  }
}

scaleSlider.addEventListener("input", () => { updateSVGSize(); });

btnStart.addEventListener("click", () => {
  if (!engine) return;
  if (engine.running) { engine.stop(); btnStart.textContent = "Start"; }
  else { engine.start(); btnStart.textContent = "Stop"; startUIUpdate(); }
});

function renderToGenerated() {
  if (!engine || !engine.currentDrawing) return;
  const s = parseInt(scaleSlider.value);
  const w = (sourceImage.naturalWidth || sourceImage.width) * s;
  const h = (sourceImage.naturalHeight || sourceImage.height) * s;
  renderToSVG(engine.currentDrawing, svgEl, w, h);
}

function updateStats() {
  if (!engine) return;
  const s = engine.getStatistics();
  statFitness.textContent = s.errorLevel === Infinity ? "-" : Math.round(s.errorLevel).toLocaleString();
  statGeneration.textContent = s.generation.toLocaleString();
  statSelected.textContent = s.selected.toLocaleString();
  statPoints.textContent = s.numPoints.toLocaleString();
  statPolygons.textContent = s.numPolygons.toLocaleString();
  statAvgPoints.textContent = s.avgPointsPerPolygon.toFixed(2);
}

let lastSelected = 0;
function startUIUpdate() {
  if (!engine || !engine.running) return;
  updateStats();
  const s = engine.getStatistics();
  if (s.selected >= lastSelected + 3) { renderToGenerated(); lastSelected = s.selected; }
  requestAnimationFrame(startUIUpdate);
}

// Auto-load embedded Mona Lisa
const embeddedImg = new Image();
embeddedImg.onload = () => loadImageFromElement(embeddedImg);
embeddedImg.src = EMBEDDED_IMAGE;
</script>
</body>
</html>
